settings:
  pending_backlog_minutes: 180
  digest_name: "İdman.biz — Азербайджанский спорт"
  sender_name: "Idman Monitor"
  timezone: "Asia/Baku"
  final_rescan_seconds_before_send: 0
  sent_memory_hours: 72
  fresh_window_minutes: 90
  max_consecutive_from_one_source: 7
  if_news_count_over_40_summary_sentences: 1
  normal_summary_sentences: 2
  max_items_per_email: 50
  exclude_keywords:
    - "букмекер"
    - "букмекеры"
    - "ставки"
    - "stavka"
    - "bukmeker"
  # Only Azerbaijani sport; these are soft matching hints, not strict top-word filters.
  az_sport_hints:
    - "азербайджан"
    - "azerbaycan"
    - "azerbaijan"
    - "azərbaycan"
    - "qarabağ"
    - "qarabag"
    - "karabakh"
    - "карабах"
    - "neftçi"
    - "neftchi"
    - "нефтчи"
    - "sabah"
    - "zira"
    - "zirə"
    - "qəbələ"
    - "gabala"
    - "сборная"
    - "millimiz"
    - "yığma"
    - "federasiya"
    - "federation"
    - "чемпионат азербайджана"
    - "misli"
  sport_emoji:
    football: "⚽"
    futsal: "⚽"
    basketball: "🏀"
    volleyball: "🏐"
    mma: "🥋"
    judo: "🥋"
    wrestling: "🤼"
    chess: "♟️"
    other: "🏅"
